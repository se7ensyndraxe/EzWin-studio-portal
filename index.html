<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzWın Studıo | Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; position: relative;
        }

        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex; 
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 0.6s ease;
        }
        #enter-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        #enter-overlay h2 { font-size: 11px; letter-spacing: 12px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; animation: neonLoader 2s infinite; }
        @keyframes neonLoader { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* ARKA PLAN VE TUVAL */
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .static-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05), transparent 70%);
            z-index: -1;
        }

        .container { text-align: center; z-index: 10; width: 100%; max-width: 600px; padding: 20px; }

        /* BAŞLIKLAR */
        h1.studio-title { 
            font-size: 42px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase;
            background: linear-gradient(90deg, #666 0%, #fff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .designer-tag { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }

        /* GRID YAPISI */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Yan yana iki sütun */
            gap: 12px;
            width: 100%;
        }

        .full-width { grid-column: span 2; } /* Bazı butonlar tam genişlik kaplayacak */

        /* YOUTUBE BUTON STİLİ */
        .yt-btn {
            display: flex; align-items: center; gap: 12px; padding: 15px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px; text-decoration: none; color: white; transition: 0.3s;
            font-size: 13px;
        }
        .yt-btn:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }
        .yt-btn i { color: #FF0000; font-size: 18px; }

        /* DISCORD BEYAZ BUTON STİLİ */
        .dc-white-btn {
            display: flex; align-items: center; justify-content: center; padding: 15px;
            background: #fff; color: #000; border-radius: 14px;
            text-decoration: none; font-weight: 800; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px; transition: 0.3s;
            text-align: center;
        }
        .dc-white-btn:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }

        .founder-tag { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 4px; margin-top: 30px; text-transform: uppercase; }
        .powered-tag { position: fixed; bottom: 20px; right: 20px; font-size: 8px; opacity: 0.4; letter-spacing: 2px; }

        /* ANIMASYON GİRİŞİ */
        .anim-wrap { opacity: 0; transform: translateY(20px); transition: 0.8s ease forwards; }
        body.loaded .anim-wrap { opacity: 1; transform: translateY(0); }

        #video-container { position: absolute; left: -9999px; }
    </style>
</head>
