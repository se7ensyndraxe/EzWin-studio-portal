        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: uppercase; user-select: none; }

        /* Yazdırma Koruması */

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        #flash-bang { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 11000; opacity: 0; pointer-events: none; }
        
        #enter-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #enter-overlay h2 { font-size: 12px; letter-spacing: 12px; color: #fff; animation: glowPulse 2s infinite; font-weight: 400; }
        
        @keyframes glowPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; text-shadow: 0 0 15px #fff; } }

        .animated-gradient { background: linear-gradient(90deg, #333, #fff, #333); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 4s linear infinite; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Müzik Paneli */
        .music-panel { position: absolute; top: 30px; left: 30px; z-index: 8000; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(25px); padding: 12px 22px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; gap: 18px; opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s; }
        body.loaded .music-panel { opacity: 1; transform: translateX(0); }
        .nav-btn, #mute-btn, #menu-btn { cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.7); }
        .nav-btn:hover { color: #fff; transform: scale(1.2); }

        #playlist-menu { position: absolute; top: 85px; left: 30px; width: 320px; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(30px); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px; display: none; flex-direction: column; gap: 8px; z-index: 8001; }
        #playlist-menu.active { display: flex; }
        .playlist-item { padding: 12px 18px; border-radius: 8px; font-size: 10px; font-weight: 800; cursor: pointer; color: rgba(255,255,255,0.4); display: flex; justify-content: space-between; }
        .playlist-item.playing { background: #fff; color: #000; }

        /* Ana Konteyner */
        .container { text-align: center; z-index: 100; width: 100%; max-width: 950px; padding: 20px; margin: 0 auto; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        .anim-wrap { opacity: 0; transform: translateY(30px); transition: 1.2s forwards; }
        body.loaded .anim-wrap { opacity: 1; transform: translateY(0); }

        h1.studio-title { font-size: 48px; font-weight: 900; letter-spacing: -1px; }
        .designer-tag { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 5px; margin-bottom: 50px; }

        /* Buton Izgarası */
        .layout-grid { display: flex; align-items: center; gap: 20px; width: 100%; }
        .side-col { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .center-col { flex: 1.3; display: flex; flex-direction: column; gap: 15px; }

        .base-btn { height: 55px; border-radius: 12px; text-decoration: none; font-weight: 800; display: flex; align-items: center; justify-content: center; transition: 0.4s; font-size: 11px; border: 1px solid rgba(255,255,255,0.12); color: #fff; background: rgba(255,255,255,0.05); }
        .white-btn { background: #fff; color: #000; border: none; }
        .white-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .special-main-btn { background: #111 !important; border: 2px solid #fff !important; height: 65px; font-size: 13px; }
        .special-main-btn:hover { background: #fff !important; color: #000 !important; transform: translateY(-8px); }

        .powered-by { position: fixed; bottom: 30px; right: 30px; font-size: 9px; font-weight: 900; letter-spacing: 3px; }
        #video-container { position: absolute; left: -9999px; }
    </style>

    <script>
        // Arka Plan Animasyonu
        const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d'); let shapes = [];
        const textPool = ["EZ", "WIN", "LD✦", "404"];
        
        function initBG() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; shapes = [];
            for(let i=0; i<80; i++) shapes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*15+5, speed: Math.random()*0.3+0.1, op: Math.random()*0.15, rot: Math.random()*Math.PI*2, text: textPool[Math.floor(Math.random()*textPool.length)]});
        }
        function drawBG() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            shapes.forEach(s => {
                ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.rot); ctx.fillStyle = `rgba(255,255,255,${s.op})`;
                ctx.font = `${s.size}px monospace`; ctx.fillText(s.text, 0, 0); ctx.restore();
                s.y -= s.speed; if(s.y < -50) s.y = canvas.height+50;
            });
            requestAnimationFrame(drawBG);
        }
        initBG(); drawBG();

        // Müzik Kontrolleri
        let player, currentTrackIndex = 0;
        const tracks = [{id:"KhqNTjbQ71A"}, {id:"eCRG6UAsDgc"}, {id:"x5Oag4hISgU"}, {id:"gelwwYuYGn0"}];
        function onYouTubeIframeAPIReady() { player = new YT.Player('player', { height: '1', width: '1', videoId: tracks[0].id, playerVars: {'autoplay':0, 'controls':0}, events: {'onReady': e => e.target.setVolume(30)} }); }
        
        function triggerFlash() { 
            document.getElementById('flash-bang').style.opacity = '1'; document.getElementById('enter-overlay').style.display = 'none';
            setTimeout(() => { document.body.classList.add('loaded'); player.playVideo(); document.getElementById('flash-bang').style.opacity = '0'; }, 600);
        }
        function togglePlaylist() { document.getElementById('playlist-menu').classList.toggle('active'); }
        function selectTrack(i) { currentTrackIndex = i; player.loadVideoById(tracks[i].id); document.querySelectorAll('.playlist-item').forEach((it,idx)=>it.classList.toggle('playing', idx===i)); }
        function toggleMute() { if(player.isMuted()){player.unMute();}else{player.mute();} }
        function nextTrack() { currentTrackIndex=(currentTrackIndex+1)%tracks.length; selectTrack(currentTrackIndex); }
        function prevTrack() { currentTrackIndex=(currentTrackIndex-1+tracks.length)%tracks.length; selectTrack(currentTrackIndex); }
        document.getElementById('vol-slider').addEventListener('input', (e) => player.setVolume(e.target.value));
    </script>
