        .vol-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* --- ANA KONTEYNER --- */
        .container { text-align: center; z-index: 10; width: 100%; max-width: 900px; padding: 20px; }

        /* BAŞLIK VE SUBTEXT */

        /* 3 SÜTUNLU LAYOUT */

        .side-col { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .center-col { flex: 1.3; display: flex; flex-direction: column; gap: 15px; }

        @media (max-width: 800px) { .layout-grid { flex-direction: column; } }

        /* BUTON TASARIMLARI (Kapalı Gri & Beyaz) */

        /* Beyaz Butonlar */

    <script>
        // --- ARKA PLAN ANİMASYONU (Modern Partikül Plexus) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let numParticles = 80;

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            numParticles = canvas.width < 768 ? 40 : 80; // Mobilde daha az partikül
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.size = Math.random() * 1.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < numParticles; i++) { particles.push(new Particle()); }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                // Çizgiler
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 255, 255, ${1 - dist / 120})`;
                        ctx.lineWidth = 0.4;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawParticles);
        }
        initParticles(); drawParticles();

        // --- YOUTUBE PLAYER SES (Phonk) ---
        let player;
        const volSlider = document.getElementById('vol-slider');
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'gelwwYuYGn0', // Just the Two of Us Phonk Remix
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'gelwwYuYGn0', 'controls': 0 },
                events: {
                    'onReady': (event) => { event.target.setVolume(volSlider.value); },
                    'onStateChange': (event) => { if (event.data === YT.PlayerState.ENDED) { player.playVideo(); } }
                }
            });
        }

        function startExperience() {
            document.getElementById('enter-overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('enter-overlay').style.display = 'none'; }, 800);
            if(player) player.playVideo();
        }

        volSlider.addEventListener('input', (e) => {
            if(player && typeof player.setVolume === 'function') { player.setVolume(e.target.value); }
        });
    </script>
