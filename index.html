<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzWın Studıo | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Poppins:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: uppercase; }

        body {
            background-color: #080808; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* --- ARKA PLAN --- */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* --- GİRİŞ VE FLASH --- */
        #flash-bang { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 100000; opacity: 0; pointer-events: none; }
        #enter-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #080808; z-index: 90000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #enter-overlay h2 { font-size: 11px; letter-spacing: 12px; font-weight: 400; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* --- BOUNCE (DÜŞÜP KALMA) EFECTİ --- */
        @keyframes dropBounce {
            0% { transform: translateY(-1000px); opacity: 0; }
            60% { transform: translateY(30px); opacity: 1; }
            85% { transform: translateY(-15px); opacity: 1; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        /* Önemli: Başlangıçta görünmezler, loaded sınıfıyla düşüp görünür kalırlar */
        .falling { opacity: 0; }
        body.loaded .falling { 
            animation: dropBounce 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        /* --- SES HUD --- */
        #audio-hud {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 30px 50px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 80000; display: flex; flex-direction: column; align-items: center; gap: 15px;
            opacity: 0; transition: 0.4s; pointer-events: none;
        }
        #audio-hud.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* --- MÜZİK PANELİ --- */
        .music-panel {
            position: absolute; top: 30px; left: 30px; z-index: 70000;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px);
            padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 15px;
        }
        .nav-btn, #mute-btn, #menu-btn { cursor: pointer; color: rgba(255,255,255,0.6); font-size: 14px; transition: 0.3s; }
        .nav-btn:hover { color: #fff; transform: scale(1.1); }
        .vol-slider { width: 50px; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: #fff; border-radius: 50%; }

        /* --- TASARIM --- */
        .container { text-align: center; z-index: 1000; width: 100%; max-width: 950px; padding: 20px; }
        h1.studio-title { font-size: 50px; font-weight: 900; letter-spacing: -2px; margin-bottom: 5px; }
        .designer-tag { font-size: 8px; color: rgba(255,255,255,0.3); letter-spacing: 5px; margin-bottom: 40px; }

        .layout-grid { display: flex; align-items: center; gap: 15px; }
        .side-col { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .center-col { flex: 1.2; display: flex; flex-direction: column; gap: 12px; }

        .base-btn { height: 55px; border-radius: 10px; text-decoration: none; font-weight: 800; display: flex; align-items: center; justify-content: center; transition: 0.3s; font-size: 10px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .white-btn { background: #fff; color: #000; border: none; }
        .white-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .yt-btn { background: rgba(255,255,255,0.03); color: #fff; justify-content: flex-start; padding-left: 20px; }
        .yt-btn i { margin-right: 12px; color: #ff0000; font-size: 18px; }
        .main-dc-btn { height: 65px; border: 1.5px solid #fff; background: transparent; font-size: 12px; }
        .main-dc-btn:hover { background: #fff; color: #000; }

        #video-container { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="flash-bang"></div>

    <div id="enter-overlay" onclick="triggerFlash()">
        <h2>CLICK TO ENTER</h2>
    </div>

    <div id="audio-hud">
        <i id="hud-icon" class="fa-solid fa-volume-high" style="font-size: 24px;"></i>
        <span id="hud-text">SES ACIK</span>
    </div>

    <div class="music-panel falling" style="animation-delay: 0.7s;">
        <i id="menu-btn" class="fa-solid fa-bars"></i>
        <i class="fa-solid fa-backward-step nav-btn" onclick="prevTrack()"></i>
        <div id="mute-btn" onclick="toggleMute()">
            <i id="panel-icon" class="fa-solid fa-volume-high"></i>
        </div>
        <i class="fa-solid fa-forward-step nav-btn" onclick="nextTrack()"></i>
        <input type="range" id="vol-slider" class="vol-slider" min="0" max="100" value="30">
    </div>

    <div id="video-container"><div id="player"></div></div>

    <div class="container">
        <div class="falling" style="animation-delay: 0.1s;">
            <h1 class="studio-title">EZWIN STUDIO</h1>
            <p class="designer-tag">DESIGNED BY SE7ENSYNDRAXE</p>
        </div>

        <div class="layout-grid">
            <div class="side-col">
                <a href="#" class="base-btn white-btn falling" style="animation-delay: 0.3s;">JOIN THE EZWIN MUSIC</a>
                <a href="#" class="base-btn white-btn falling" style="animation-delay: 0.5s;">EZWIN HESAP HIZMETLERI</a>
            </div>
            <div class="center-col">
                <a href="#" class="base-btn yt-btn falling" style="animation-delay: 0.2s;"><i class="fa-brands fa-youtube"></i> EZWIN STUDIO</a>
                <a href="#" class="base-btn yt-btn falling" style="animation-delay: 0.4s;"><i class="fa-brands fa-youtube"></i> EZWIN MUSIC</a>
                <a href="#" class="base-btn main-dc-btn falling" style="animation-delay: 0.6s;">JOIN THE EZWIN STUDIO</a>
            </div>
            <div class="side-col">
                <a href="#" class="base-btn white-btn falling" style="animation-delay: 0.4s;">EZWIN UNCOPYLOCKED</a>
                <a href="#" class="base-btn white-btn falling" style="animation-delay: 0.7s;">JOIN THE EZWIN CHEAT</a>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- ARKA PLAN (PS & CODE) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let shapes = [];
        const codes = ["{ }", "EZ", "WIN", "ROOT", "404"];

        function initBG() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            shapes = [];
            for(let i=0; i<45; i++) {
                shapes.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    size: Math.random()*15+10, type: Math.floor(Math.random()*5),
                    speed: Math.random()*0.3+0.1, op: Math.random()*0.15,
                    text: codes[Math.floor(Math.random()*codes.length)], rot: Math.random()*Math.PI
                });
            }
        }

        function drawBG() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            shapes.forEach(s => {
                ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.rot);
                ctx.strokeStyle = `rgba(255,255,255,${s.op})`; ctx.fillStyle = `rgba(255,255,255,${s.op})`;
                if(s.type === 0) ctx.strokeRect(-s.size/2, -s.size/2, s.size, s.size);
                else if(s.type === 1) { ctx.font = `${s.size}px 'Fira Code'`; ctx.fillText(s.text, 0, 0); }
                else if(s.type === 2) { ctx.beginPath(); ctx.arc(0,0,s.size/2,0,Math.PI*2); ctx.stroke(); }
                else { ctx.beginPath(); ctx.moveTo(-s.size/2,-s.size/2); ctx.lineTo(s.size/2,s.size/2); ctx.moveTo(s.size/2,-s.size/2); ctx.lineTo(-s.size/2,s.size/2); ctx.stroke(); }
                ctx.restore(); s.y -= s.speed; if(s.y < -50) s.y = canvas.height+50;
            });
            requestAnimationFrame(drawBG);
        }
        initBG(); drawBG();

        // --- FLASH SESİ VE YOUTUBE ---
        let player, cur = 0;
        const tracks = ["KhqNTjbQ71A", "eCRG6UAsDgc"];

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { height: '1', width: '1', videoId: tracks[0], events: {'onReady': (e) => e.target.setVolume(30)} });
        }

        function triggerFlash() {
            // Flash Sesi (Yüksek Frekanslı AudioContext)
            const aCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = aCtx.createOscillator(); const g = aCtx.createGain();
            osc.frequency.setValueAtTime(3800, aCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, aCtx.currentTime + 4);
            osc.connect(g); g.connect(aCtx.destination);
            osc.start(); osc.stop(aCtx.currentTime + 4);

            document.getElementById('flash-bang').style.opacity = '1';
            document.getElementById('enter-overlay').style.display = 'none';
            
            setTimeout(() => {
                document.body.classList.add('loaded'); 
                if(player) player.playVideo();
                let op = 1; 
                const f = setInterval(() => { 
                    op -= 0.05; 
                    document.getElementById('flash-bang').style.opacity = op; 
                    if(op<=0) { clearInterval(f); document.getElementById('flash-bang').style.display='none'; }
                }, 30);
            }, 600);
        }

        function showHUD(text, icon) {
            const h = document.getElementById('audio-hud');
            document.getElementById('hud-icon').className = "fa-solid " + icon;
            document.getElementById('hud-text').innerText = text;
            h.classList.add('show'); setTimeout(() => h.classList.remove('show'), 1500);
        }

        function toggleMute() {
            if (player.isMuted()) { player.unMute(); showHUD("SES ACIK", "fa-volume-high"); }
            else { player.mute(); showHUD("SES KAPATILDI", "fa-volume-xmark"); }
        }
        function selectTrack(i) { player.loadVideoById(tracks[i]); showHUD("MUZIK DEGISTI", "fa-music"); }
        function nextTrack() { cur = (cur+1)%tracks.length; selectTrack(cur); }
        function prevTrack() { cur = (cur-1+tracks.length)%tracks.length; selectTrack(cur); }
        document.getElementById('vol-slider').addEventListener('input', (e) => player.setVolume(e.target.value));
    </script>
</body>
</html>
