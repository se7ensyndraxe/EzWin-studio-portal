    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* GİRİŞ EKRANI - KURŞUN GEÇİRMEZ VERSİYON */
        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; 
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }
        #enter-overlay.hide { opacity: 0; visibility: hidden; }
        #enter-overlay h2 { font-size: 12px; letter-spacing: 12px; color: #fff; text-transform: uppercase; animation: glowPulse 2s infinite; }
        
        @keyframes glowPulse { 0%, 100% { opacity: 0.3; text-shadow: 0 0 0px #fff; } 50% { opacity: 1; text-shadow: 0 0 20px #fff; } }

        /* SES PANELİ */
        .music-panel {
            position: absolute; top: 30px; left: 30px; z-index: 500;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            padding: 12px 18px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s;
        }
        body.loaded .music-panel { opacity: 1; transform: translateX(0); }
        .vol-slider { width: 70px; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; cursor: pointer; }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .static-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.03), transparent 80%);
            z-index: -1;
        }

        .container { text-align: center; z-index: 10; width: 100%; max-width: 950px; padding: 20px; }

        /* ANİMASYONLAR */
        .anim-wrap { opacity: 0; transform: translateY(30px); transition: 1s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }
        body.loaded .anim-wrap { opacity: 1; transform: translateY(0); }

        h1.studio-title { 
            font-size: 48px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 2px;
        }
        .designer-tag { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 5px; margin-bottom: 50px; }

        /* 3 SÜTUNLU LAYOUT */
        .layout-grid { display: flex; align-items: center; gap: 20px; width: 100%; }
        .side-col { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .center-col { flex: 1.3; display: flex; flex-direction: column; gap: 15px; }

        @media (max-width: 850px) { .layout-grid { flex-direction: column; } }

        /* BUTON TASARIMLARI */
        .base-btn {
            height: 55px; border-radius: 12px; text-decoration: none; font-weight: 800;
            display: flex; align-items: center; justify-content: center; transition: 0.3s all;
            font-size: 11px; letter-spacing: 0.5px; border: 1px solid transparent;
        }

        .white-btn { background: #fff; color: #000; text-transform: uppercase; }
        .white-btn:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }

        .yt-btn {
            background: rgba(255,255,255,0.03); color: #fff; border-color: rgba(255,255,255,0.1);
            justify-content: flex-start; padding-left: 15px; backdrop-filter: blur(10px);
        }
        .yt-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); transform: translateY(-3px); }
        .yt-btn i { color: #ff0000; font-size: 18px; margin-right: 12px; }

        /* --- ÖZEL ANA BUTON (SPECIAL JOIN) --- */
        .special-main-btn {
            background: #111 !important; color: #fff !important;
            height: 65px; font-size: 13px; letter-spacing: 1px;
            border: 1px solid #fff !important;
            position: relative; overflow: hidden;
            animation: mainPulse 2s infinite ease-in-out;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        .special-main-btn:hover {
            background: #fff !important; color: #000 !important;
            transform: scale(1.05) translateY(-5px) !important;
            box-shadow: 0 0 30px rgba(255,255,255,0.6) !important;
        }

        @keyframes mainPulse {
            0% { box-shadow: 0 0 5px rgba(255,255,255,0.2); }

        .founder-tag { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 4px; margin-top: 40px; }
        
        /* POWERED BY - ULTRA PARLAK */

            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            opacity: 0.9; pointer-events: none;
        }

        #video-container { position: absolute; left: -9999px; }
    </style>
</head>

    <script>
        // Arka Plan Partikül Sistemi
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 50; i++) {
                particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4, size: Math.random() * 1.5 });
            }
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; if(p.x < 0 || p.x > canvas.width) p.vx *= -1; if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', initCanvas); initCanvas(); draw();

        // YouTube Player
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1', videoId: 'qvF5iq_s01Q',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'qvF5iq_s01Q' },
                events: { 'onReady': (e) => e.target.setVolume(30) }
            });
        }

        // Tıklama Fonksiyonu (Garantili)
        function startExperience() {
            const overlay = document.getElementById('enter-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => { 
                overlay.style.visibility = 'hidden'; 
                document.body.classList.add('loaded');
                if(player && typeof player.playVideo === 'function') player.playVideo();
            }, 800);
        }

        // Ses Kaydırıcı
        const volSlider = document.getElementById('vol-slider');
        if(volSlider) {
            volSlider.addEventListener('input', (e) => {
                if(player && typeof player.setVolume === 'function') player.setVolume(e.target.value);
            });
        }
    </script>
