<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzWın Studıo | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* GİRİŞ EKRANI */
        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex; 
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #enter-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        #enter-overlay h2 { font-size: 11px; letter-spacing: 12px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; animation: neonLoader 2s infinite; }
        @keyframes neonLoader { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* SES PANELİ */
        .music-panel {
            position: absolute; top: 30px; left: 30px; z-index: 500;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            padding: 12px 18px; border-radius: 166px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s;
        }
        body.loaded .music-panel { opacity: 1; transform: translateX(0); }
        .vol-slider { width: 70px; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; cursor: pointer; }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .static-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05), transparent 70%);
            z-index: -1;
        }

        /* CONTAINER */
        .container { text-align: center; z-index: 10; width: 100%; max-width: 950px; padding: 40px 20px; }

        @keyframes dropBounce { 0% { transform: translateY(-50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .anim-wrap { opacity: 0; }
        body.loaded .anim-wrap { animation: dropBounce 1s ease forwards; }

        /* BAŞLIKLAR */
        h1.studio-title { 
            font-size: 42px; font-weight: 900; letter-spacing: -1px; 
            text-transform: uppercase; margin-bottom: 2px;
            background: linear-gradient(90deg, #666 0%, #fff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        .designer-tag, .founder-tag { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 4px; text-transform: uppercase; }
        .designer-tag { margin-bottom: 45px; }
        .founder-tag { margin-top: 35px; }
        
        /* POWERED BY - GÜÇLENDİRİLMİŞ PARLAKLIK */
        .powered-tag { 
            position: fixed; bottom: 30px; right: 30px; font-size: 8px; 
            color: rgba(255,255,255,0.8); /* Opaklık artırıldı */
            letter-spacing: 2px; text-transform: uppercase;
            filter: brightness(1.5); /* Parlaklık artırıldı */
        }

        /* 3 SÜTUNLU YAPI */
        .three-col-layout { display: flex; justify-content: center; align-items: center; gap: 20px; width: 100%; }
        .side-col { display: flex; flex-direction: column; gap: 15px; flex: 1; }
        .center-col { display: flex; flex-direction: column; gap: 15px; flex: 1.2; }

        /* BUTON STANDARTLARI */
        .ios-btn, .join-btn {
            height: 55px;
            border-radius: 14px; text-decoration: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 11px; font-weight: 800; letter-spacing: 0.5px;
        }

        .ios-btn {
            display: flex; align-items: center; padding: 0 15px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px); color: white; font-size: 12px;
        }
        .ios-btn:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }
        .icon-box { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: rgba(255,255,255,0.05); margin-right: 12px; }
        .yt-red { color: #FF0000; }

        /* DİĞER DISCORD BEYAZ BUTONLARI */
        .join-btn {
            display: flex; align-items: center; justify-content: center;
            background: #fff; color: #000; text-transform: uppercase; border: none; cursor: pointer;
            padding: 0 10px; text-align: center;
        }
        .join-btn:hover { transform: scale(1.03); box-shadow: 0 10px 20px rgba(255,255,255,0.15); }
        
        /* --- ÖZEL ANA DISCORD BUTONU VE ANİMASYONU (Wingman) --- */
        .main-join { 
            position: relative;
            background: #111; /* Koyu metalik */
            color: #fff; /* Metin beyaz */
            font-size: 14px; font-weight: 900;
            height: 60px; /* Bir tık daha büyük */
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            z-index: 1;
            /* Sürekli nefes alma animasyonu (Wingman Pulse) */
            animation: wingmanPulse 3s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dönen Neon Çerçeve Efekti (Pseudo-element) */
        .main-join::before {
            content: ''; position: absolute;
            top: -2px; left: -2px; width: calc(100% + 4px); height: calc(100% + 4px);
            border: 2px solid #fff; border-radius: 16px;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
            z-index: -1; pointer-events: none;
            opacity: 0.1; /* Normalde sönük */
            transition: 0.3s;
        }

        .main-join:hover {
            transform: scale(1.05);
            background: #000;
            border-color: rgba(255, 255, 255, 0.3);
            /* Hoverda parlama artar */
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3), 0 0 60px rgba(255, 255, 255, 0.1);
        }

        .main-join:hover::before { opacity: 1; animation: rotatingFrame 2s linear infinite; }

        /* Nefes alma animasyonu */
        @keyframes wingmanPulse {
            0% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.1), 0 0 20px rgba(255, 255, 255, 0.05); }
            100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 0 40px rgba(255, 255, 255, 0.1); }
        }

        /* Dönen çerçeve animasyonu */
        @keyframes rotatingFrame {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #video-container { position: absolute; left: -9999px; }
    </style>
</head>
