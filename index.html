    <script>
        // Arka Plan ve Müzik Scriptleri (Bunlar açık kalmalı ki müziği değiştirebilelim)
        const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d'); let shapes = [];
        const textPool = ["EZ", "WIN", "𝐋𝐃✦", "ROOT", "404"];
        function initBG() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; shapes = [];
            for(let i=0; i<100; i++) shapes.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*15+5, speed: Math.random()*0.4+0.1, op: Math.random()*0.2, rot: Math.random()*Math.PI*2, text: textPool[Math.floor(Math.random()*textPool.length)]});
        }
        function drawBG() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            shapes.forEach(s => {
                ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.rot); ctx.fillStyle = `rgba(255,255,255,${s.op})`;
                ctx.font = `${s.size}px monospace`; ctx.fillText(s.text, 0, 0); ctx.restore();
                s.y -= s.speed; if(s.y < -50) s.y = canvas.height+50;
            });
            requestAnimationFrame(drawBG);
        }
        initBG(); drawBG();

        let player, currentTrackIndex = 0;
        const tracks = [{id:"KhqNTjbQ71A"}, {id:"eCRG6UAsDgc"}, {id:"x5Oag4hISgU"}, {id:"gelwwYuYGn0"}];
        function onYouTubeIframeAPIReady() { player = new YT.Player('player', { height: '1', width: '1', videoId: tracks[0].id, playerVars: {'autoplay':0, 'controls':0}, events: {'onReady': e => e.target.setVolume(30)} }); }
        function triggerFlash() { 
            document.getElementById('flash-bang').style.opacity = '1'; document.getElementById('enter-overlay').style.display = 'none';
            setTimeout(() => { document.body.classList.add('loaded'); player.playVideo(); document.getElementById('flash-bang').style.opacity = '0'; }, 600);
        }
        function selectTrack(i) { currentTrackIndex = i; player.loadVideoById(tracks[i].id); document.querySelectorAll('.playlist-item').forEach((it,idx)=>it.classList.toggle('playing', idx===i)); }
        function toggleMute() { if(player.isMuted()){player.unMute();}else{player.mute();} }
        function nextTrack() { currentTrackIndex=(currentTrackIndex+1)%tracks.length; selectTrack(currentTrackIndex); }
        function prevTrack() { currentTrackIndex=(currentTrackIndex-1+tracks.length)%tracks.length; selectTrack(currentTrackIndex); }
    </script>
