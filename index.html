    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;

        /* GİRİŞ EKRANI */
        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; 
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #enter-overlay.hide { opacity: 0; visibility: hidden; }
        #enter-overlay h2 { font-size: 12px; letter-spacing: 12px; color: #fff; text-transform: uppercase; animation: glowPulse 2s infinite; }
        @keyframes glowPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; text-shadow: 0 0 15px #fff; } }

        /* MERKEZ SES BİLDİRİMİ (HUD) */
        #audio-hud {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px);
            padding: 30px 50px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 9000; display: flex; flex-direction: column; align-items: center; gap: 15px;
            opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #audio-hud.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        #audio-hud i { font-size: 50px; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        #audio-hud span { font-size: 14px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }

        /* MÜZİK PANELİ */
        .music-panel {
            position: absolute; top: 30px; left: 30px; z-index: 500;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            padding: 12px 18px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s;
        }
        body.loaded .music-panel { opacity: 1; transform: translateX(0); }
        #mute-btn { cursor: pointer; width: 25px; display: flex; justify-content: center; transition: 0.2s; }
        .vol-slider { width: 70px; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; cursor: pointer; }

        /* LAYOUT & BUTONLAR */
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .container { text-align: center; z-index: 10; width: 100%; max-width: 950px; padding: 20px; }
        .anim-wrap { opacity: 0; transform: translateY(30px); transition: 1s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }
        body.loaded .anim-wrap { opacity: 1; transform: translateY(0); }
        h1.studio-title { font-size: 48px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; background: linear-gradient(180deg, #fff 0%, #444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .designer-tag { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 5px; margin-bottom: 50px; }
        .layout-grid { display: flex; align-items: center; gap: 20px; width: 100%; }
        .side-col { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .center-col { flex: 1.3; display: flex; flex-direction: column; gap: 15px; }
        .base-btn { height: 55px; border-radius: 12px; text-decoration: none; font-weight: 800; display: flex; align-items: center; justify-content: center; transition: 0.3s all; font-size: 11px; letter-spacing: 0.5px; }
        .white-btn { background: #fff; color: #000; text-transform: uppercase; }
        .white-btn:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        .yt-btn { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid rgba(255,255,255,0.1); justify-content: flex-start; padding-left: 15px; }
        .yt-btn i { color: #ff0000; font-size: 18px; margin-right: 12px; }
        .special-main-btn { background: #111 !important; color: #fff !important; height: 65px; border: 1px solid #fff !important; animation: mainPulse 2s infinite ease-in-out; }
        @keyframes mainPulse { 0%, 100% { box-shadow: 0 0 5px rgba(255,255,255,0.2); } 50% { box-shadow: 0 0 20px rgba(255,255,255,0.4); } }
        .powered-by { position: fixed; bottom: 30px; right: 30px; font-size: 9px; color: #fff; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 10px rgba(255,255,255,0.8); opacity: 0.9; }
        #video-container { position: absolute; left: -9999px; }
    </style>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let isMuted = false;
        let hudTimeout;
        let lastVolume = 30;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1', videoId: 'qvF5iq_s01Q',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'qvF5iq_s01Q' },
                events: { 'onReady': (e) => e.target.setVolume(30) }
            });
        }

        // --- MERKEZİ SES KONTROLÜ (HUD + İKON GÜNCELLEME) ---
        function updateAudioUI(muteState) {
            const panelIcon = document.getElementById('panel-icon');
            const hud = document.getElementById('audio-hud');
            const hudIcon = document.getElementById('hud-icon');
            const hudText = document.getElementById('hud-text');

            if (muteState) {
                panelIcon.className = "fa-solid fa-volume-xmark";
                hudIcon.className = "fa-solid fa-volume-xmark";
                hudText.innerText = "SES KAPATILDI";
            } else {
                panelIcon.className = "fa-solid fa-volume-high";
                hudIcon.className = "fa-solid fa-volume-high";
                hudText.innerText = "SES AÇILDI";
            }

            // Bildirimi Göster
            hud.classList.add('show');
            clearTimeout(hudTimeout);
            hudTimeout = setTimeout(() => { hud.classList.remove('show'); }, 1500);
        }

        function toggleMute() {
            if (!player) return;
            isMuted = !isMuted;
            if (isMuted) {
                player.mute();
            } else {
                player.unMute();
                if(player.getVolume() === 0) {
                    player.setVolume(30);
                    document.getElementById('vol-slider').value = 30;
                }
            }
            updateAudioUI(isMuted);
        }

        // --- SLIDER DİNLEYİCİSİ (SENKRONİZE) ---
        document.getElementById('vol-slider').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            if (!player) return;

            player.setVolume(val);

            if (val === 0 && !isMuted) {
                isMuted = true;
                player.mute();
                updateAudioUI(true);
            } else if (val > 0 && isMuted) {
                isMuted = false;
                player.unMute();
                updateAudioUI(false);
            }
        });

        function startExperience() {
            const overlay = document.getElementById('enter-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => { 
                overlay.style.visibility = 'hidden'; 
                document.body.classList.add('loaded');
                if(player && typeof player.playVideo === 'function') player.playVideo();
            }, 800);
        }

        // Canvas Partiküller
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            parts = Array.from({length: 40}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3}));
        }
        function loop() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(255,255,255,0.15)";
            parts.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>canvas.width)p.vx*=-1; if(p.y<0||p.y>canvas.height)p.vy*=-1; ctx.beginPath(); ctx.arc(p.x,p.y,1,0,Math.PI*2); ctx.fill(); });
            requestAnimationFrame(loop);
        }
        window.addEventListener('resize', init); init(); loop();
    </script>
