<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* GİRİŞ EKRANI */
        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex; 
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #enter-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        #enter-overlay h2 { font-size: 11px; letter-spacing: 12px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; animation: neonLoader 2s infinite; }
        @keyframes neonLoader { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* SES PANELİ */
        .music-panel {
            position: absolute; top: 30px; left: 30px; z-index: 500;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            padding: 12px 18px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s;
        }
        body.loaded .music-panel { opacity: 1; transform: translateX(0); }
        .vol-slider { width: 70px; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; cursor: pointer; }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .static-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.05), transparent 60%),
                        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.05), transparent 60%);
            z-index: -1;
        }

        /* 3 SÜTUN İÇİN GENİŞLETİLMİŞ CONTAINER */
        .container { text-align: center; z-index: 10; width: 100%; max-width: 950px; padding: 40px 20px; }

        @keyframes dropBounce { 0% { transform: translateY(-50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .anim-wrap { opacity: 0; }
        body.loaded .anim-wrap { animation: dropBounce 1s ease forwards; }

        /* BAŞLIKLAR */
        h1.studio-title { 
            font-size: 42px; font-weight: 900; letter-spacing: -1px; 
            text-transform: uppercase; margin-bottom: 2px;
            background: linear-gradient(90deg, #666 0%, #fff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        .designer-tag, .founder-tag, .powered-tag { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 4px; text-transform: uppercase; }
        .designer-tag { margin-bottom: 45px; }
        .founder-tag { margin-top: 35px; }
        .powered-tag { position: fixed; bottom: 30px; right: 30px; letter-spacing: 2px; opacity: 0.5; }

        /* YENİ 3 SÜTUNLU YAPI (Sol - Orta - Sağ) */
        .three-col-layout {
            display: flex;
            justify-content: center;
            align-items: center; /* Yan sütunları ortaya dikey olarak hizalar */
            gap: 20px;
            width: 100%;
        }
        .side-col { display: flex; flex-direction: column; gap: 15px; flex: 1; }
        .center-col { display: flex; flex-direction: column; gap: 15px; flex: 1.2; }

        /* Mobil Cihazlar İçin Uyum */
        @media (max-width: 850px) {
            .three-col-layout { flex-direction: column; }
        }

        /* BUTON STANDARTLARI */
        .ios-btn, .join-btn {
            height: 55px;
            border-radius: 14px; text-decoration: none; transition: 0.3s;
            font-size: 11px; font-weight: 800; letter-spacing: 0.5px;
        }

        .ios-btn {
            display: flex; align-items: center; padding: 0 15px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px); color: white; font-size: 12px;
        }
        .ios-btn:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }
        .icon-box { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: rgba(255,255,255,0.05); margin-right: 12px; }
        .yt-red { color: #FF0000; }

        .join-btn {
            display: flex; align-items: center; justify-content: center;
            background: #fff; color: #000; text-transform: uppercase; border: none; cursor: pointer;
            padding: 0 10px; text-align: center;
        }
        .join-btn:hover { transform: scale(1.03); box-shadow: 0 10px 20px rgba(255,255,255,0.15); }
        
        /* Merkezdeki Ana Discord Butonu İçin Özel Vurgu */
        .main-join { font-size: 13px; background: #fff; color: #000; }

        #video-container { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // Arkaplan Animasyonu
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 60; i++) {
                particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3, size: Math.random() * 1.2 });
            }
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "rgba(255, 255, 255, 0.2)"; ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; if(p.x < 0 || p.x > canvas.width) p.vx *= -1; if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                for(let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j]; if(Math.hypot(p.x - p2.x, p.y - p2.y) < 120) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                }
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', initCanvas); initCanvas(); draw();

        // YouTube Player
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1', videoId: 'qvF5iq_s01Q',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'qvF5iq_s01Q' },
                events: { 'onReady': (e) => e.target.setVolume(30) }
            });
        }

        // Click to Enter 
        function startExperience() { 
            document.getElementById('enter-overlay').classList.add('hide'); 
            document.body.classList.add('loaded'); 
            if(player && typeof player.playVideo === 'function') player.playVideo(); 
        }

        // Ses Ayarı
        const volSlider = document.getElementById('vol-slider');
        if(volSlider) {
            volSlider.addEventListener('input', (e) => { 
                if(player && typeof player.setVolume === 'function') player.setVolume(e.target.value); 
            });
        }
    </script>
