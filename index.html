<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWIN STUDIO | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; text-transform: uppercase; }

        body {
            background-color: #080808; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* --- YENI: TAMAMEN KODLA OLUSTURULAN AKICI ARKA PLAN --- */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(125deg, #0c0c0c, #1a1a1a, #050505, #111);
            background-size: 400% 400%;
            z-index: -1;
            animation: gradientFlow 15s ease infinite;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- FLASHBANG KATMANI --- */
        #flash-bang { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 20000; opacity: 0; pointer-events: none; }

        /* --- GIRIS EKRANI (FIXED) --- */
        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #080808; z-index: 30000; /* En üstte */
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        #enter-overlay h2 { font-size: 14px; letter-spacing: 12px; color: #fff; animation: glowPulse 2s infinite; pointer-events: none; }
        @keyframes glowPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; text-shadow: 0 0 20px #fff; } }

        /* --- HUD BİLDİRİMLERİ --- */
        #audio-hud {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            padding: 25px 45px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 15000; display: flex; flex-direction: column; align-items: center; gap: 12px;
            opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #audio-hud.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* --- MÜZİK PANELİ --- */
        .music-panel {
            position: absolute; top: 30px; left: 30px; z-index: 10000;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            padding: 12px 22px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; align-items: center; gap: 15px;
            opacity: 0; transform: translateX(-20px); transition: 1s ease 0.5s;
        }
        body.loaded .music-panel { opacity: 1; transform: translateX(0); }
        .nav-btn, #mute-btn, #menu-btn { cursor: pointer; transition: 0.2s; color: rgba(255,255,255,0.6); }
        .nav-btn:hover, #mute-btn:hover, #menu-btn:hover { color: #fff; transform: scale(1.15); }
        .vol-slider { width: 60px; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: #fff; border-radius: 50%; cursor: pointer; }

        /* --- PLAYLIST --- */
        #playlist-menu {
            position: absolute; top: 85px; left: 30px; width: 300px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(30px);
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px; display: none; flex-direction: column; gap: 6px; z-index: 10001;
        }
        #playlist-menu.active { display: flex; animation: fadeIn 0.3s ease; }
        .playlist-item { padding: 12px; border-radius: 8px; font-size: 10px; cursor: pointer; transition: 0.2s; color: rgba(255,255,255,0.4); display: flex; justify-content: space-between; align-items: center; }
        .playlist-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .playlist-item.playing { background: #fff; color: #000; font-weight: 900; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ANA TASARIM --- */
        .container { text-align: center; z-index: 500; width: 100%; max-width: 900px; padding: 20px; }
        .anim-wrap { opacity: 0; transform: translateY(20px); transition: 1s forwards; }
        body.loaded .anim-wrap { opacity: 1; transform: translateY(0); }

        h1.studio-title { font-size: 44px; font-weight: 900; letter-spacing: -1px; margin-bottom: 5px; }
        .designer-tag { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 5px; margin-bottom: 45px; }

        .layout-grid { display: flex; align-items: center; gap: 20px; }
        .side-col { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .center-col { flex: 1.3; display: flex; flex-direction: column; gap: 15px; }

        .base-btn { height: 55px; border-radius: 12px; text-decoration: none; font-weight: 800; display: flex; align-items: center; justify-content: center; transition: 0.3s; font-size: 11px; letter-spacing: 1px; cursor: pointer; }
        .white-btn { background: #fff; color: #000; border: none; }
        .white-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,255,255,0.15); }
        .yt-btn { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid rgba(255,255,255,0.1); justify-content: flex-start; padding-left: 20px; }
        .yt-btn:hover { background: rgba(255,255,255,0.08); border-color: #fff; transform: translateY(-5px); }
        .yt-btn i { color: #fff; margin-right: 15px; font-size: 16px; }
        .special-main-btn { background: transparent; color: #fff; height: 65px; border: 1px solid #fff; }
        .special-main-btn:hover { background: #fff; color: #000; }

        .powered-by { position: fixed; bottom: 30px; right: 30px; font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 2px; }
        #video-container { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <div id="flash-bang"></div>

        <i id="menu-btn" class="fa-solid fa-bars" onclick="togglePlaylist()"></i>
        <i class="fa-solid fa-backward-step nav-btn" onclick="prevTrack()"></i>
        <div id="mute-btn" onclick="toggleMute()">
            <i id="panel-icon" class="fa-solid fa-volume-high"></i>
        </div>
        <i class="fa-solid fa-forward-step nav-btn" onclick="nextTrack()"></i>
        <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="30">
    </div>

    <div id="playlist-menu">
        <div class="playlist-item playing" data-index="0" onclick="selectTrack(0)"><span>REVENGE</span> <i class="fa-solid fa-music"></i></div>
        <div class="playlist-item" data-index="1" onclick="selectTrack(1)"><span>SLAUGHTER HOUSE</span> <i class="fa-solid fa-music"></i></div>
        <div class="playlist-item" data-index="2" onclick="selectTrack(2)"><span>MONTAGEM PR FUNK</span> <i class="fa-solid fa-music"></i></div>
        <div class="playlist-item" data-index="3" onclick="selectTrack(3)"><span>METAMORPHOSIS</span> <i class="fa-solid fa-music"></i></div>
    </div>

    <div id="video-container"><div id="player"></div></div>

    <div class="container">
        <div class="anim-wrap" style="transition-delay: 0.1s;">
            <h1 class="studio-title">EZWIN STUDIO</h1>
            <div class="designer-tag">DESIGNED BY LD✦ SE7ENSYNDRAXE</div>
        </div>

        <div class="layout-grid">
            <div class="side-col anim-wrap" style="transition-delay: 0.3s;">
                <a href="https://discord.gg/CnapcSfNq5" target="_blank" class="base-btn white-btn">JOIN THE EZWIN MUSIC</a>
                <a href="https://discord.gg/G7s3kgtSJX" target="_blank" class="base-btn white-btn">EZWIN HESAP HIZMETLERI</a>
            </div>
            <div class="center-col anim-wrap" style="transition-delay: 0.2s;">
                <a href="https://www.youtube.com/@EzW%C4%B1nStud%C4%B1o" target="_blank" class="base-btn yt-btn"><i class="fa-brands fa-youtube"></i> <b>EZWIN STUDIO</b></a>
                <a href="https://www.youtube.com/@EzWınMusıc" target="_blank" class="base-btn yt-btn"><i class="fa-brands fa-youtube"></i> <b>EZWIN MUSIC</b></a>
                <a href="https://www.youtube.com/@EzWinYaSen" target="_blank" class="base-btn yt-btn"><i class="fa-brands fa-youtube"></i> <b>EZWIN YASEN</b></a>
                <a href="https://discord.gg/xDydNyHnUd" target="_blank" class="base-btn special-main-btn">JOIN THE EZWIN STUDIO</a>
            </div>
            <div class="side-col anim-wrap" style="transition-delay: 0.4s;">
                <a href="https://discord.gg/jwtmt46ZPb" target="_blank" class="base-btn white-btn">EZWIN UNCOPYLOCKED</a>
                <a href="https://discord.gg/m2uDdfUEdf" target="_blank" class="base-btn white-btn">JOIN THE EZWIN CHEAT</a>
            </div>
        </div>
    </div>

    <div class="powered-by">POWERED BY: EZWINSTUDIO</div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player, hudTimeout, currentTrackIndex = 0;
        const tracks = ["KhqNTjbQ71A", "eCRG6UAsDgc", "x5Oag4hISgU", "gelwwYuYGn0"];

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { height: '1', width: '1', videoId: tracks[0], playerVars: {'autoplay':0}, events: {'onReady': (e) => e.target.setVolume(30)} });
        }

        function triggerFlash() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(3800, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 5);

            document.getElementById('flash-bang').style.opacity = '1';
            document.getElementById('enter-overlay').style.display = 'none';
            
            setTimeout(() => {
                document.body.classList.add('loaded');
                if(player) player.playVideo();
                let op = 1;
                const f = setInterval(() => { op -= 0.02; document.getElementById('flash-bang').style.opacity = op; if(op<=0){clearInterval(f); document.getElementById('flash-bang').style.display='none';}}, 40);
            }, 600);
        }

        function showHUD(text, icon) {
            const h = document.getElementById('audio-hud');
            document.getElementById('hud-icon').className = "fa-solid " + icon;
            document.getElementById('hud-text').innerText = text;
            h.classList.add('show');
            clearTimeout(hudTimeout);
            hudTimeout = setTimeout(() => h.classList.remove('show'), 1500);
        }

        function togglePlaylist() { document.getElementById('playlist-menu').classList.toggle('active'); }

        function selectTrack(idx) {
            currentTrackIndex = idx;
            player.loadVideoById(tracks[idx]);
            showHUD("MUZIK DEGISTI", "fa-music");
            document.querySelectorAll('.playlist-item').forEach((it, i) => it.classList.toggle('playing', i === idx));
        }

        function toggleMute() {
            if (player.isMuted()) { player.unMute(); document.getElementById('panel-icon').className="fa-solid fa-volume-high"; showHUD("SES ACIK", "fa-volume-high"); }
            else { player.mute(); document.getElementById('panel-icon').className="fa-solid fa-volume-xmark"; showHUD("SES KAPALI", "fa-volume-xmark"); }
        }

        function nextTrack() { currentTrackIndex = (currentTrackIndex + 1) % tracks.length; selectTrack(currentTrackIndex); }
        function prevTrack() { currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length; selectTrack(currentTrackIndex); }

        document.getElementById('vol-slider').addEventListener('input', (e) => { if(player) player.setVolume(e.target.value); });
    </script>
</body>
</html>
