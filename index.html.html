        body {

        #enter-overlay {

        #enter-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        #enter-overlay h2 { font-size: 11px; letter-spacing: 12px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; animation: neonLoader 2s infinite; }
        @keyframes neonLoader { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .music-panel {
            position: absolute; top: 30px; left: 30px; z-index: 500;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            padding: 12px 18px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s;
        }
        body.loaded .music-panel { opacity: 1; transform: translateX(0); }
        .vol-slider { width: 70px; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; cursor: pointer; }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .static-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.1), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.1), transparent 50%);
            z-index: -1;
        }

        .container { text-align: center; z-index: 10; width: 100%; max-width: 500px; padding: 40px 20px; margin-top: -50px; }

        @keyframes dropBounce {
            0% { transform: translateY(-100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .anim-wrap { opacity: 0; }
        body.loaded .anim-wrap { animation: dropBounce 1s ease forwards; }

        /* ANA BAŞLIK: GRİDEN BEYAZA GEÇİŞ */
        h1.studio-title { 
            font-size: 38px; font-weight: 900; letter-spacing: -1px;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        .designer-tag, .founder-tag, .powered-tag {

            letter-spacing: 4px; text-transform: uppercase; 
        }
        .designer-tag { margin-bottom: 35px; }
        .founder-tag { margin-top: 15px; }
        .powered-tag { position: fixed; bottom: 30px; right: 30px; letter-spacing: 2px; opacity: 0.5; }

        .link-wrapper { display: flex; flex-direction: column; gap: 12px; }
        
        /* BUTON TASARIMLARI */
        .ios-btn {
            display: flex; align-items: center; justify-content: space-between; padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px); text-decoration: none; color: white; border-radius: 15px;
            transition: 0.3s;
        }
        .ios-btn:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }
        
        .icon-box { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; background: rgba(255,255,255,0.05); }

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 60; i++) {
                particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3, size: Math.random() * 1.2 });
            }
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "rgba(255, 255, 255, 0.2)"; ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; if(p.x < 0 || p.x > canvas.width) p.vx *= -1; if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                for(let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j]; if(Math.hypot(p.x - p2.x, p.y - p2.y) < 120) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                }
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', initCanvas); initCanvas(); draw();

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1', videoId: 'qvF5iq_s01Q',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'qvF5iq_s01Q' },
                events: { 'onReady': (e) => e.target.setVolume(30) }
            });
        }
        function startExperience() { document.getElementById('enter-overlay').classList.add('hide'); document.body.classList.add('loaded'); if(player && player.playVideo) player.playVideo(); }
        document.getElementById('vol-slider').addEventListener('input', (e) => { if(player) player.setVolume(e.target.value); });
    </script>
